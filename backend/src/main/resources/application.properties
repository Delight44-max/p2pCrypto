spring.application.name=de-tech-p2p

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/detechp2p}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================
# Connection Pool
# ==========================
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
logging.level.com.zaxxer.hikari=DEBUG


# Blockchain BSC Configuration
bsc.rpc.url=${BSC_RPC_URL}
bsc.contract.address=${CONTRACT_ADDRESS}
bsc.usdt.address=${USDT_CONTRACT_ADDRESS}
bsc.fee.wallet=${PLATFORM_WALLET}




# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC


# JWT
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration=${JWT_EXPIRATION:7200000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
app.jwt.issuer=de-tech-p2p


# Frontend URL
app.frontend.url=${FRONTEND_URL:http://localhost:3000}


# CoinGecko API
coingecko.api.url=https://api.coingecko.com/api/v3

# Server
server.port=${PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# File Upload
# ==========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Actuator
# ==========================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true


# Logging
logging.level.root=INFO
logging.level.com.detech=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN

# Application Info
# ==========================
app.api.version=v1
info.app.name=De-Tech P2P
info.app.description=Crypto Escrow Trading Platform
info.app.version=1.0.0